{% load static %}
<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>PetShop</title>
  <link rel="stylesheet" href="{% static 'shop/css/style.css' %}">
  <script src="{% static 'shop/js/main.js' %}" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1><a href="{% url 'shop:home' %}">PetShop</a></h1>
      <nav>
        <a href="{% url 'shop:home' %}">Home</a>
        <a href="{% url 'shop:cart' %}">Cart</a>
        {% if user.is_authenticated %}
          <span>Hi, {{ user.username }}</span>
          <a href="{% url 'shop:logout' %}">Logout</a>
        {% else %}
          <a href="{% url 'shop:login' %}">Login / Register</a>
        {% endif %}
        <a href="{% url 'shop:admin_login' %}">Admin</a>
      </nav>
    </div>
  </header>

  <main class="container">
    {% if messages %}
      <ul class="messages">
      {% for m in messages %}
        <li class="message {{ m.tags }}">{{ m }}</li>
      {% endfor %}
      </ul>
    {% endif %}
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="container">© PetShop - Demo</div>
  </footer>
</body>
</html>
