{% extends "shop/base.html" %}
{% block content %}
  {% if is_register %}
    <h2>Register</h2>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="btn" type="submit">Register</button>
    </form>
    <p>Already have an account? <a href="{% url 'shop:login' %}">Login</a></p>
  {% else %}
    <h2>Login</h2>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="btn" type="submit">Login</button>
    </form>
    <p>Don't have an account? <a href="{% url 'shop:register' %}">Register</a></p>
  {% endif %}
{% endblock %}
